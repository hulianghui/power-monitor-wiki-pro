<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱 - 电力在线监测知识库</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* 知识图谱页面专属样式 */
        .page-header {
            padding: 100px 0 40px;
            text-align: center;
        }
        
        .page-title {
            font-size: var(--text-3xl);
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-subtitle {
            font-size: var(--text-lg);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 图谱容器 */
        .graph-container {
            position: relative;
            height: calc(100vh - 300px);
            min-height: 600px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin: 0 var(--spacing-xl) var(--spacing-3xl);
        }
        
        #knowledge-graph {
            width: 100%;
            height: 100%;
        }
        
        /* 图例 */
        .graph-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            z-index: 10;
        }
        
        .legend-title {
            font-size: var(--text-sm);
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .legend-dot.rfid {
            background: linear-gradient(135deg, var(--rfid-primary), var(--rfid-secondary));
        }
        
        .legend-dot.monitor {
            background: linear-gradient(135deg, var(--monitor-primary), var(--monitor-secondary));
        }
        
        .legend-dot.module {
            background: var(--brand-primary);
        }
        
        .legend-dot.item {
            background: var(--text-tertiary);
        }
        
        /* 控制面板 */
        .graph-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--duration-fast);
        }
        
        .control-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--brand-primary);
            color: var(--text-primary);
        }
        
        /* 节点信息面板 */
        .node-info {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            max-height: 400px;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            z-index: 10;
            display: none;
            overflow-y: auto;
        }
        
        .node-info.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .node-info-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: color var(--duration-fast);
        }
        
        .node-info-close:hover {
            color: var(--text-primary);
        }
        
        .node-info h3 {
            font-size: var(--text-lg);
            font-weight: 600;
            margin-bottom: 12px;
            padding-right: 30px;
        }
        
        .node-info p {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .node-info-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }
        
        .node-info-tag {
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: var(--radius-full);
            font-size: 11px;
            color: var(--brand-primary);
        }
        
        .node-info-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border-radius: var(--radius-md);
            color: white;
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-fast);
            border: none;
        }
        
        .node-info-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        
        /* D3 图谱样式 */
        .node circle {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node:hover circle {
            filter: brightness(1.2);
        }
        
        .node text {
            font-size: 12px;
            fill: var(--text-primary);
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }
        
        .link {
            stroke-opacity: 0.4;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            stroke-opacity: 0.8;
            stroke-width: 2px;
        }
        
        /* 加载动画 */
        .graph-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .graph-loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--brand-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .graph-loading p {
            color: var(--text-secondary);
            font-size: var(--text-sm);
        }
    </style>
</head>
<body>
    <!-- 背景光效 -->
    <div class="bg-glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <div class="nav-brand-icon">⚡</div>
            <span>电力监测知识库</span>
        </a>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="rfid.html" class="nav-link">RFID测温</a>
            <a href="monitor.html" class="nav-link">在线监测</a>
            <a href="graph.html" class="nav-link active">知识图谱</a>
        </div>
        
        <div class="nav-actions">
            <div class="search-box" id="searchTrigger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" placeholder="搜索知识库..." readonly>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">知识图谱</h1>
                <p class="page-subtitle">
                    可视化探索知识网络，发现技术关联，快速定位所需信息
                </p>
            </div>
        </section>

        <!-- 图谱容器 -->
        <div class="graph-container">
            <!-- 加载动画 -->
            <div class="graph-loading" id="graphLoading">
                <div class="graph-loading-spinner"></div>
                <p>正在构建知识网络...</p>
            </div>
            
            <!-- 图例 -->
            <div class="graph-legend">
                <div class="legend-title">图例说明</div>
                <div class="legend-item">
                    <div class="legend-dot rfid"></div>
                    <span>RFID测温</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot monitor"></div>
                    <span>在线监测</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot module"></div>
                    <span>知识模块</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot item"></div>
                    <span>知识点</span>
                </div>
            </div>
            
            <!-- 节点信息面板 -->
            <div class="node-info" id="nodeInfo">
                <div class="node-info-close" onclick="closeNodeInfo()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </div>
                <h3 id="nodeTitle">节点标题</h3>
                <p id="nodeDescription">节点描述内容...</p>
                <div class="node-info-tags" id="nodeTags"></div>
                <button class="node-info-btn" id="nodeAction" onclick="navigateToNode()">
                    <span>查看详情</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14"></path>
                        <path d="m12 5 7 7-7 7"></path>
                    </svg>
                </button>
            </div>
            
            <!-- 控制按钮 -->
            <div class="graph-controls">
                <button class="control-btn" onclick="zoomIn()" title="放大">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
                <button class="control-btn" onclick="zoomOut()" title="缩小">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </button>
                <button class="control-btn" onclick="resetZoom()" title="重置">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>
            
            <!-- SVG 图谱 -->
            <svg id="knowledge-graph"></svg>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span>⚡</span>
                    <span>电力在线监测知识库</span>
                </div>
                <div class="footer-copyright">
                    © 2026 浙江悦和科技有限公司 版权所有
                </div>
            </div>
        </div>
    </footer>

    <!-- AI助手 -->
    <div class="ai-assistant" onclick="location.href='chat.html'">
        <button class="ai-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
                <line x1="8" y1="22" x2="16" y2="22"></line>
            </svg>
            <span>AI助手</span>
        </button>
    </div>

    <!-- 搜索弹窗 -->
    <div class="search-modal" id="searchModal">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索知识库..." autofocus>
                <div class="search-close" onclick="closeSearch()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </div>
            </div>
            
            <div class="search-results" id="searchResults"></div>
            
            <div class="search-tags">
                <div class="search-tags-title">热门搜索</div>
                <div class="search-tags-list">
                    <span class="search-tag" onclick="searchByTag('RFID原理')">RFID原理</span>
                    <span class="search-tag" onclick="searchByTag('温度传感器')">温度传感器</span>
                    <span class="search-tag" onclick="searchByTag('故障诊断')">故障诊断</span>
                    <span class="search-tag" onclick="searchByTag('开关柜')">开关柜</span>
                    <span class="search-tag" onclick="searchByTag('变压器')">变压器</span>
                    <span class="search-tag" onclick="searchByTag('载流量计算')">载流量计算</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/knowledge-data.js"></script>
    <script src="js/search.js"></script>
    <script>
        // 知识图谱数据
        let graphData = { nodes: [], links: [] };
        let selectedNode = null;
        let svg, g, simulation, zoom;
        
        // 初始化图谱
        function initGraph() {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            // 创建SVG
            svg = d3.select('#knowledge-graph')
                .attr('width', width)
                .attr('height', height);
            
            // 添加缩放行为
            zoom = d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            // 创建主组
            g = svg.append('g');
            
            // 构建图谱数据
            buildGraphData();
            
            // 渲染图谱
            renderGraph();
            
            // 隐藏加载动画
            document.getElementById('graphLoading').style.display = 'none';
        }
        
        // 构建图谱数据
        function buildGraphData() {
            const kb = window.knowledgeBase;
            const nodes = [];
            const links = [];
            
            // 添加根节点
            nodes.push({
                id: 'root',
                name: '电力监测知识库',
                type: 'root',
                radius: 30,
                color: '#6366f1'
            });
            
            // 添加RFID节点
            nodes.push({
                id: 'rfid',
                name: 'RFID测温',
                type: 'category',
                category: 'rfid',
                radius: 25,
                color: '#a855f7'
            });
            links.push({ source: 'root', target: 'rfid' });
            
            // 添加监测节点
            nodes.push({
                id: 'monitor',
                name: '在线监测',
                type: 'category',
                category: 'monitor',
                radius: 25,
                color: '#06b6d4'
            });
            links.push({ source: 'root', target: 'monitor' });
            
            // 添加RFID模块和知识点
            if (kb.rfid && kb.rfid.modules) {
                kb.rfid.modules.forEach(module => {
                    const moduleId = `rfid-${module.id}`;
                    nodes.push({
                        id: moduleId,
                        name: module.title,
                        type: 'module',
                        category: 'rfid',
                        moduleId: module.id,
                        radius: 18,
                        color: '#8b5cf6'
                    });
                    links.push({ source: 'rfid', target: moduleId });
                    
                    // 添加知识点
                    if (module.items) {
                        module.items.forEach(item => {
                            const itemId = `rfid-${module.id}-${item.id}`;
                            nodes.push({
                                id: itemId,
                                name: item.title,
                                type: 'item',
                                category: 'rfid',
                                moduleId: module.id,
                                itemId: item.id,
                                summary: item.summary,
                                tags: item.tags,
                                radius: 12,
                                color: '#c084fc'
                            });
                            links.push({ source: moduleId, target: itemId });
                        });
                    }
                });
            }
            
            // 添加监测模块和知识点
            if (kb.monitor && kb.monitor.modules) {
                kb.monitor.modules.forEach(module => {
                    const moduleId = `monitor-${module.id}`;
                    nodes.push({
                        id: moduleId,
                        name: module.title,
                        type: 'module',
                        category: 'monitor',
                        moduleId: module.id,
                        radius: 18,
                        color: '#3b82f6'
                    });
                    links.push({ source: 'monitor', target: moduleId });
                    
                    // 添加知识点
                    if (module.items) {
                        module.items.forEach(item => {
                            const itemId = `monitor-${module.id}-${item.id}`;
                            nodes.push({
                                id: itemId,
                                name: item.title,
                                type: 'item',
                                category: 'monitor',
                                moduleId: module.id,
                                itemId: item.id,
                                summary: item.summary,
                                tags: item.tags,
                                radius: 12,
                                color: '#60a5fa'
                            });
                            links.push({ source: moduleId, target: itemId });
                        });
                    }
                });
            }
            
            graphData = { nodes, links };
        }
        
        // 渲染图谱
        function renderGraph() {
            const width = svg.attr('width');
            const height = svg.attr('height');
            
            // 创建力导向模拟
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(d => {
                    if (d.source.type === 'root') return 150;
                    if (d.source.type === 'category') return 100;
                    return 60;
                }))
                .force('charge', d3.forceManyBody().strength(d => {
                    if (d.type === 'root') return -1000;
                    if (d.type === 'category') return -500;
                    if (d.type === 'module') return -300;
                    return -100;
                }))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.radius + 5));
            
            // 绘制连线
            const link = g.append('g')
                .attr('class', 'links')
                .selectAll('line')
                .data(graphData.links)
                .enter().append('line')
                .attr('class', 'link')
                .attr('stroke', '#475569')
                .attr('stroke-width', 1.5);
            
            // 绘制节点
            const node = g.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(graphData.nodes)
                .enter().append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('click', (event, d) => showNodeInfo(d));
            
            // 节点圆形
            node.append('circle')
                .attr('r', d => d.radius)
                .attr('fill', d => d.color)
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .attr('stroke-opacity', 0.3);
            
            // 节点文字
            node.append('text')
                .attr('dy', d => d.radius + 15)
                .attr('text-anchor', 'middle')
                .text(d => d.name.length > 8 ? d.name.substring(0, 8) + '...' : d.name)
                .style('opacity', d => d.type === 'item' ? 0.7 : 1);
            
            // 更新位置
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }
        
        // 拖拽行为
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // 显示节点信息
        function showNodeInfo(node) {
            selectedNode = node;
            const infoPanel = document.getElementById('nodeInfo');
            
            document.getElementById('nodeTitle').textContent = node.name;
            document.getElementById('nodeDescription').textContent = node.summary || '点击节点查看详细信息';
            
            // 显示标签
            const tagsContainer = document.getElementById('nodeTags');
            if (node.tags && node.tags.length > 0) {
                tagsContainer.innerHTML = node.tags.map(tag => 
                    `<span class="node-info-tag">${tag}</span>`
                ).join('');
                tagsContainer.style.display = 'flex';
            } else {
                tagsContainer.style.display = 'none';
            }
            
            // 显示/隐藏按钮
            const actionBtn = document.getElementById('nodeAction');
            if (node.type === 'item') {
                actionBtn.style.display = 'inline-flex';
            } else {
                actionBtn.style.display = 'none';
            }
            
            infoPanel.classList.add('active');
        }
        
        // 关闭节点信息
        function closeNodeInfo() {
            document.getElementById('nodeInfo').classList.remove('active');
            selectedNode = null;
        }
        
        // 导航到节点详情
        function navigateToNode() {
            if (!selectedNode) return;
            
            const page = selectedNode.category === 'rfid' ? 'rfid.html' : 'monitor.html';
            window.location.href = `${page}#${selectedNode.moduleId}`;
        }
        
        // 缩放控制
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }
        
        // 搜索弹窗控制
        const searchTrigger = document.getElementById('searchTrigger');
        const searchModal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');
        
        searchTrigger.addEventListener('click', () => {
            searchModal.classList.add('active');
            searchInput.focus();
        });
        
        function closeSearch() {
            searchModal.classList.remove('active');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSearch();
            }
        });
        
        searchModal.addEventListener('click', (e) => {
            if (e.target === searchModal) {
                closeSearch();
            }
        });
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 延迟初始化，确保数据加载完成
            setTimeout(initGraph, 100);
        });
        
        // 窗口大小改变时重新渲染
        window.addEventListener('resize', () => {
            const container = document.querySelector('.graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            svg.attr('width', width).attr('height', height);
            simulation.force('center', d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
