<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>会议聚焦计时器 · 真正加大时间块 · 单行巨钟 · 巨型弹窗</title>
    <!-- 柔和现代风格，Inter字体，Font Awesome图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            color: #1e293b;
        }

        .meeting-card {
            max-width: 1200px;  /* 进一步加宽，容纳更大的左列 */
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.35), 0 8px 24px -6px rgba(0,32,64,0.2);
            padding: 2.2rem 2rem;
            border: 1px solid rgba(255,255,255,0.5);
            transition: box-shadow 0.2s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.1rem;
            color: #0f1825;
        }

        h1 i {
            color: #2d7ee9;
            font-size: 2rem;
        }

        .subhead {
            font-size: 0.95rem;
            color: #54657e;
            margin-bottom: 2rem;
            border-left: 4px solid #2d7ee9;
            padding-left: 1rem;
            font-weight: 400;
        }

        /* 两列布局：左列大幅加宽 (2.5fr vs 1fr)，让时间块真正变大 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 720px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .meeting-card { padding: 1.8rem 1.2rem; }
        }

        /* 卡片通用样式 */
        .control-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.8rem;  /* 增加内边距，使卡片更大 */
            box-shadow: 0 6px 18px rgba(0,10,30,0.1);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #596f8f;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .section-label i {
            font-size: 1rem;
            width: 1.4rem;
            color: #2d7ee9;
        }

        /* 总时长设置 */
        .duration-set {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .duration-input-wrap {
            flex: 2;
            min-width: 150px;
        }
        .duration-set input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid #dde3eb;
            border-radius: 3rem;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.15s;
            background: #f9fcff;
        }
        .duration-set input:focus {
            outline: none;
            border-color: #2d7ee9;
            box-shadow: 0 0 0 3px rgba(45,126,233,0.15);
        }
        .duration-set button {
            flex: 1;
            background: #1e2b3c;
            border: none;
            color: white;
            padding: 0.9rem 1.4rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid #1e2b3c;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .duration-set button:hover {
            background: #0f1a28;
            border-color: #0f1a28;
        }
        .duration-set button:disabled {
            opacity: 0.4;
            pointer-events: none;
            background: #99a9c2;
            border-color: #7f8fa0;
        }

        /* 当前议题 */
        .topic-edit {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .topic-edit i {
            color: #2d7ee9;
            font-size: 1.2rem;
        }
        #currentTopicInput {
            flex: 1;
            border: none;
            background: #f0f5fe;
            padding: 0.9rem 1.4rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 500;
            border: 1.5px solid transparent;
            transition: 0.15s;
        }
        #currentTopicInput:focus {
            outline: none;
            border-color: #2d7ee9;
            background: #ffffff;
        }

        /* 巨型计时器 ———— 尺寸大幅增加，强制单行 */
        .timer-monster {
            background: white;
            border-radius: 3rem;          /* 更大圆角 */
            padding: 3rem 2rem;            /* 大幅增加内边距，让块更大 */
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02), 0 12px 24px rgba(0,20,40,0.15);
        }

        /* 时间显示：强制不换行，动态字体大小确保单行可见 */
        .time-remaining {
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 2px;
            font-feature-settings: "tnum";
            color: #0f1a2b;
            margin-bottom: 0.2rem;
            white-space: nowrap;            /* 坚决不换行 */
            font-size: clamp(4rem, 12vw, 9rem); /* 动态调整，最小4rem，最大9rem */
        }

        /* 在小屏幕堆叠时，时间再根据视口调整，但依然单行 */
        @media (max-width: 500px) {
            .time-remaining {
                font-size: clamp(3.5rem, 15vw, 7rem);
            }
            .timer-monster {
                padding: 2rem 1rem;
            }
        }

        .time-remaining.urgent {
            color: #c2493a;
        }
        .time-remaining.overtime {
            color: #b91c1c;
        }

        .elapsed-info {
            font-size: 1.6rem;            /* 明显增大 */
            color: #2a3b55;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
            white-space: nowrap;
            flex-wrap: wrap;
        }

        .progress-bar-bg {
            margin-top: 2.2rem;
            height: 22px;                  /* 进度条加高 */
            background: #e3e9f2;
            border-radius: 40px;
            overflow: hidden;
            width: 100%;
        }

        #progressFill {
            height: 100%;
            width: 0%;
            background: #2d7ee9;
            border-radius: 40px;
            transition: width 0.1s ease;
        }

        #progressFill.overtime {
            background: #d14545;
        }

        /* 控制按钮组 */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        .action-btn {
            border: none;
            background: #edf2f9;
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            color: #1d2b3f;
            cursor: pointer;
            transition: 0.1s;
            flex: 1 0 auto;
            border: 1px solid transparent;
        }
        .action-btn i { font-size: 1.1rem; }
        .action-btn.primary {
            background: #2d7ee9;
            color: white;
            box-shadow: 0 6px 14px rgba(45,126,233,0.3);
        }
        .action-btn.primary:hover {
            background: #1b64c7;
        }
        .action-btn:not(.primary):hover {
            background: #e0e8f2;
            border-color: #cbd5e1;
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 发散专区 */
        .distraction-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .focus-warning-btn {
            background: #fef6e0;
            border: 2px solid #f7b731;
            border-radius: 2.5rem;
            padding: 1.6rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-weight: 700;
            font-size: 1.8rem;
            color: #a7691a;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #e09d2b;
        }
        .focus-warning-btn i {
            font-size: 2.2rem;
            color: #e9941a;
        }
        .focus-warning-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b87d23;
        }
        .focus-warning-btn:focus-visible {
            outline: 3px solid #f7b731;
            outline-offset: 2px;
        }

        /* 发散次数区域：强制一行不换行，子元素收缩自适应 */
        .distraction-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffffcc;
            padding: 1rem 1.4rem;
            border-radius: 4rem;
            font-weight: 600;
            flex-wrap: nowrap;           /* 禁止换行 */
            gap: 0.5rem;                 /* 添加小间隙 */
        }
        .distraction-meta span:first-child {
            white-space: nowrap;          /* 文本不换行 */
            flex-shrink: 0;               /* 防止缩小 */
        }
        .badge-count {
            background: #1e2b3c;
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 1.5rem;
            font-weight: 700;
            flex-shrink: 0;               /* 数字不压缩 */
            line-height: 1.2;
        }
        .reset-count-btn {
            background: none;
            border: 1px solid #ccd9e9;
            border-radius: 2rem;
            padding: 0.5rem 1.4rem;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #54657e;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;           /* 按钮文字不换行 */
            flex-shrink: 0;                 /* 防止压缩 */
        }
        .reset-count-btn:hover {
            background: #eef3fc;
            border-color: #9bafca;
        }

        /* 规则便签 */
        .rules-mini {
            background: #e5edf9;
            border-radius: 1.8rem;
            padding: 1.5rem 1.5rem;
            margin-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .rules-mini span {
            background: white;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        /* 闪烁聚焦消息 (Toast) ———— 现在更大更醒目 */
        .flash-message {
            position: fixed;
            top: 30px;                    /* 稍微下移，避免贴边 */
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #b02b2b;
            color: white;
            padding: 1.8rem 4rem;          /* 大幅增加内边距 */
            border-radius: 80px;            /* 更大圆角 */
            font-weight: 800;
            font-size: 2.5rem;              /* 从1.5rem增大到2.5rem */
            box-shadow: 0 30px 40px -10px rgba(180,30,30,0.6);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 999;
            border: 4px solid #ffd0d0;       /* 更明显的边框 */
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            white-space: nowrap;              /* 防止换行 */
        }
        .flash-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: none;
        }
        .flash-message i {
            font-size: 3.5rem;                /* 图标也大幅增大 */
        }
        /* 小屏幕时弹窗适当缩小，但仍保持醒目 */
        @media (max-width: 600px) {
            .flash-message {
                font-size: 1.8rem;
                padding: 1.2rem 2rem;
                border-width: 3px;
            }
            .flash-message i {
                font-size: 2.5rem;
            }
        }

        /* 页脚 */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #7589a8;
            font-size: 0.9rem;
            border-top: 1px dashed #c7d5e8;
            padding-top: 1.2rem;
        }
        .footer-note i {
            color: #d14b4b;
        }
    </style>
</head>
<body>
    <div class="meeting-card">
        <!-- 头部 -->
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1>
                <i class="fas fa-people-arrows"></i> 
                聚焦·准时
            </h1>
            <div style="background: #1e2b3c; color: white; border-radius: 40px; padding: 0.3rem 1.3rem; font-weight: 500; font-size: 0.9rem;">
                <i class="far fa-clock" style="margin-right: 6px;"></i> 今日目标：不超时
            </div>
        </div>
        <div class="subhead">
            <i class="fas fa-bullseye" style="margin-right: 8px;"></i> 
            一次只讨论一个议题，用计时和发散提醒帮团队聚焦
        </div>

        <!-- 主区域两列布局：左列2.5fr 右列1fr，时间块巨大且单行 -->
        <div class="dashboard-grid">
            <!-- 左列：计时与议题核心 (时间块已巨大化) -->
            <div class="control-card">
                <div class="section-label"><i class="fas fa-microphone"></i> 当前议题 (随时编辑)</div>
                <div class="topic-edit">
                    <i class="fas fa-pencil-alt"></i>
                    <input type="text" id="currentTopicInput" value="Q3 产品路线图评审" placeholder="例如：预算复盘">
                </div>

                <!-- 巨型计时器 (真正加大，单行巨钟) -->
                <div class="timer-monster">
                    <div id="remainingDisplay" class="time-remaining">45:00</div>
                    <div class="elapsed-info">
                        <i class="far fa-hourglass"></i>
                        <span id="elapsedDisplay">已用 00:00 / 45:00</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>

                <!-- 时长设置 + 控制按钮 -->
                <div class="duration-set" style="margin-bottom: 1rem;">
                    <div class="duration-input-wrap">
                        <input type="number" id="meetingDurationInput" min="1" max="240" value="45" step="1">
                    </div>
                    <button id="applyDurationBtn"><i class="fas fa-check"></i> 设定时长</button>
                </div>

                <div class="action-buttons">
                    <button class="action-btn primary" id="startBtn"><i class="fas fa-play"></i> 开始</button>
                    <button class="action-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> 暂停</button>
                    <button class="action-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置</button>
                </div>
                <p style="font-size:0.8rem; color:#7b8ca8; margin-top: 0.4rem; text-align: center;">
                    <i class="fas fa-info-circle"></i> 重置后使用新时长，开始后不可修改时长
                </p>
            </div>

            <!-- 右列：发散控制 & 规则 -->
            <div class="control-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <div class="section-label"><i class="fas fa-exclamation-triangle" style="color:#f19b33;"></i> 发散提醒器</div>
                    <div class="distraction-area">
                        <!-- 大按钮提醒聚焦 -->
                        <button class="focus-warning-btn" id="focusWarningBtn">
                            <i class="fas fa-bell"></i> 提醒聚焦
                        </button>
                        <!-- 计数器和重置 (现已强制一行) -->
                        <div class="distraction-meta">
                            <span><i class="far fa-comment-dots"></i> 发散提醒次数</span>
                            <span class="badge-count" id="distractionCounter">0</span>
                            <button class="reset-count-btn" id="resetCounterBtn"><i class="fas fa-redo-alt"></i> 归零</button>
                        </div>
                    </div>
                </div>

                <!-- 规则小贴士 (帮助聚焦) -->
                <div class="rules-mini">
                    <span><i class="fas fa-check-circle" style="color:#2d7ee9;"></i> 紧扣议题</span>
                    <span><i class="fas fa-stopwatch" style="color:#2d7ee9;"></i> 每人≤2分钟</span>
                    <span><i class="fas fa-ban" style="color:#d97706;"></i> 不聊闲事</span>
                    <span><i class="fas fa-flag-checkered"></i> 决策导向</span>
                </div>
            </div>
        </div>

        <!-- 页脚提示 -->
        <div class="footer-note">
            <i class="fas fa-heart" style="margin-right: 6px;"></i> 超时即预警 · 发散即提醒 · 让会议准时结束
        </div>
    </div>

    <!-- 全局闪烁消息 (默认隐藏) ———— 现在巨大化 -->
    <div id="flashFocusMessage" class="flash-message">
        <i class="fas fa-eye"></i> 聚焦！回到当前议题
    </div>

    <script>
        (function() {
            // DOM 元素
            const remainingDisplay = document.getElementById('remainingDisplay');
            const elapsedDisplay = document.getElementById('elapsedDisplay');
            const progressFill = document.getElementById('progressFill');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const applyDurationBtn = document.getElementById('applyDurationBtn');
            const durationInput = document.getElementById('meetingDurationInput');
            const currentTopicInput = document.getElementById('currentTopicInput');
            const focusWarningBtn = document.getElementById('focusWarningBtn');
            const distractionCounterSpan = document.getElementById('distractionCounter');
            const resetCounterBtn = document.getElementById('resetCounterBtn');
            const flashMsg = document.getElementById('flashFocusMessage');

            // 状态变量
            let totalSeconds = 45 * 60;            // 默认45分钟 (秒)
            let remainingSeconds = totalSeconds;
            let elapsedSeconds = 0;                 // 已用秒数
            let timerInterval = null;
            let isRunning = false;
            let distractionCount = 0;

            // 辅助函数：格式化 mm:ss (补零)
            function formatTime(seconds) {
                if (seconds < 0) {
                    // 处理负值（超时的情况，用于剩余显示）
                    const absSec = Math.abs(seconds);
                    const mins = Math.floor(absSec / 60);
                    const secs = Math.floor(absSec % 60);
                    return `+${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }

            // 更新所有显示 (剩余、已用、进度条、颜色样式)
            function updateDisplay() {
                // 剩余显示 (可为负)
                if (remainingSeconds >= 0) {
                    remainingDisplay.textContent = formatTime(remainingSeconds);
                    remainingDisplay.classList.remove('overtime');
                    // 紧急状态 (剩余小于10% 且 不超时)
                    if (remainingSeconds < totalSeconds * 0.1 && totalSeconds > 0) {
                        remainingDisplay.classList.add('urgent');
                    } else {
                        remainingDisplay.classList.remove('urgent');
                    }
                } else {
                    // 超时情况
                    remainingDisplay.textContent = formatTime(remainingSeconds); // 显示 +mm:ss
                    remainingDisplay.classList.add('overtime');
                    remainingDisplay.classList.remove('urgent');
                }

                // 已用显示
                const totalMins = Math.floor(totalSeconds / 60);
                const totalSecs = totalSeconds % 60;
                const totalFormatted = `${totalMins.toString().padStart(2, '0')}:${totalSecs.toString().padStart(2, '0')}`;
                elapsedDisplay.textContent = `已用 ${formatTime(elapsedSeconds)} / ${totalFormatted}`;

                // 进度条: 已用/总时长, 但最多100%
                let percent = (elapsedSeconds / totalSeconds) * 100;
                if (percent > 100) percent = 100;
                progressFill.style.width = percent + '%';

                if (remainingSeconds < 0) {
                    progressFill.classList.add('overtime');
                } else {
                    progressFill.classList.remove('overtime');
                }

                // 如果超时，剩余显示已经变为红色，进度条红色已处理
            }

            // 停止计时器 (如果正在运行)
            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                isRunning = false;
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                // 启用时长设置 (重置或停止时)
                durationInput.disabled = false;
                applyDurationBtn.disabled = false;
            }

            // 开始计时
            function startTimer() {
                if (isRunning) return;
                if (remainingSeconds <= -100000) return; // 过于负的截断, 但允许继续累加
                // 禁用时长设置
                durationInput.disabled = true;
                applyDurationBtn.disabled = true;

                isRunning = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;

                timerInterval = setInterval(() => {
                    // 剩余减少，已用增加
                    remainingSeconds -= 1;
                    elapsedSeconds += 1;
                    // 防止负剩余无限，但保留负数以显示超时
                    updateDisplay();
                }, 1000);
            }

            // 暂停
            function pauseTimer() {
                if (!isRunning) return;
                stopTimer();  // stopTimer 会设置 isRunning = false 并启用开始按钮，禁用暂停
                // 但是时长输入保持禁用? 按照逻辑暂停也不应修改时长，因为会议还在进行中，但可以设定: 暂停时也禁用时长设置，避免混乱
                // 为了安全，暂停时仍然禁用时长设置 (直到重置)
                durationInput.disabled = true;
                applyDurationBtn.disabled = true;
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }

            // 重置计时器
            function resetTimer() {
                // 停止任何正在运行的计时
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                isRunning = false;
                // 从输入框获取最新总时长 (秒)
                let newMinutes = parseInt(durationInput.value, 10);
                if (isNaN(newMinutes) || newMinutes < 1) newMinutes = 1;
                if (newMinutes > 240) newMinutes = 240;  // 上限4小时
                durationInput.value = newMinutes;        // 回写规范值
                totalSeconds = newMinutes * 60;
                remainingSeconds = totalSeconds;
                elapsedSeconds = 0;
                updateDisplay();

                // 按钮状态复原
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                // 启用时长设置
                durationInput.disabled = false;
                applyDurationBtn.disabled = false;
            }

            // 应用新时长（不重置计时状态，但一般在非运行状态使用）
            function applyDuration() {
                if (isRunning) return; // 运行时不能应用 (按钮已被禁用, 但以防直接调用)
                let newMinutes = parseInt(durationInput.value, 10);
                if (isNaN(newMinutes) || newMinutes < 1) newMinutes = 1;
                if (newMinutes > 240) newMinutes = 240;
                durationInput.value = newMinutes;
                totalSeconds = newMinutes * 60;
                // 如果当前剩余秒数比总秒数大(重置前可能不同步)，同步剩余
                remainingSeconds = totalSeconds;
                elapsedSeconds = 0;
                updateDisplay();
            }

            // 发散提醒 + 计数器
            function triggerFocusWarning() {
                // 增加计数
                distractionCount += 1;
                distractionCounterSpan.textContent = distractionCount;

                // 闪烁消息 (先移除可能已有的show，再添加)
                flashMsg.classList.remove('show');
                // 强制重绘
                void flashMsg.offsetWidth;
                flashMsg.classList.add('show');

                // 2秒后自动隐藏
                setTimeout(() => {
                    flashMsg.classList.remove('show');
                }, 1600);

                // 附加微小的动画反馈：提醒按钮自身抖动 (简单实现)
                focusWarningBtn.style.transform = 'translateX(4px)';
                setTimeout(() => focusWarningBtn.style.transform = '', 100);
            }

            // 重置发散计数器
            function resetDistractionCounter() {
                distractionCount = 0;
                distractionCounterSpan.textContent = '0';
            }

            // 页面加载完成事件绑定
            document.addEventListener('DOMContentLoaded', function() {
                // 初始化显示
                updateDisplay();

                // 开始按钮
                startBtn.addEventListener('click', startTimer);

                // 暂停按钮
                pauseBtn.addEventListener('click', pauseTimer);

                // 重置按钮
                resetBtn.addEventListener('click', function() {
                    resetTimer();
                    // 重置时将时长输入启用 (resetTimer已做)
                });

                // 设定时长按钮
                applyDurationBtn.addEventListener('click', applyDuration);

                // 聚焦提醒按钮
                focusWarningBtn.addEventListener('click', triggerFocusWarning);

                // 归零计数器
                resetCounterBtn.addEventListener('click', resetDistractionCounter);

                // 限制输入范围
                durationInput.addEventListener('change', function() {
                    let val = parseInt(this.value, 10);
                    if (isNaN(val) || val < 1) this.value = 1;
                    else if (val > 240) this.value = 240;
                });

                // 如果用户尝试在运行时通过其他方式修改输入，但是输入框disabled，不会发生
                // 额外保护: 重置时保证输入框启用
            });

            // 超时或剩余极负时也正常更新
        })();
    </script>
</body>
</html>
