<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用工具 - 电力在线监测知识库</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --brand-primary: #6366f1;
            --brand-secondary: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: "PingFang SC", sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header-nav {
            display: flex;
            gap: 32px;
        }
        .nav-item {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.1);
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        .main {
            padding-top: 120px;
            min-height: calc(100vh - 200px);
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
        }
        .hero {
            text-align: center;
            padding: 60px 0;
        }
        .hero h1 {
            font-size: 42px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            padding-bottom: 60px;
        }
        .tool-card {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--brand-primary);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.2);
        }
        .tool-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .tool-card h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .tool-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(99, 102, 241, 0.1);
        }
        .ai-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            padding: 16px 24px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            z-index: 999;
        }
        .ai-float:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">⚡</div>
            <span style="color: var(--text-primary); font-size: 16px; font-weight: 600;">电力在线监测知识库</span>
        </div>
        <nav class="header-nav">
            <div class="nav-item" onclick="window.location.href='index.html'">首页</div>
            <div class="nav-item" onclick="window.location.href='rfid.html'">RFID 测温</div>
            <div class="nav-item" onclick="window.location.href='monitor.html'">在线监测</div>
            <div class="nav-item" onclick="window.location.href='graph.html'">知识图谱</div>
            <div class="nav-item active">工具</div>
        </nav>
        <div class="avatar">我</div>
    </div>

    <main class="main">
        <div class="container">
            <div class="hero">
                <h1>🛠️ 实用工具</h1>
                <p>提升工作效率的专业工具集</p>
            </div>
            
            <div class="tools-grid">
                <div class="tool-card" onclick="window.location.href='calculator.html'">
                    <div class="tool-icon">🧮</div>
                    <h3>参数计算器</h3>
                    <p>RFID 读取距离计算、温度精度计算、信号强度计算等专业工具</p>
                </div>
                <div class="tool-card" onclick="window.location.href='selector.html'">
                    <div class="tool-icon">🎯</div>
                    <h3>设备选型助手</h3>
                    <p>根据应用场景智能推荐传感器类型和设备配置</p>
                </div>
                <div class="tool-card" onclick="window.location.href='diagnosis.html'">
                    <div class="tool-icon">🩺</div>
                    <h3>故障诊断树</h3>
                    <p>引导式故障排查，快速定位问题根源</p>
                </div>
                <div class="tool-card" onclick="window.location.href='graph.html'">
                    <div class="tool-icon">🕸️</div>
                    <h3>知识图谱</h3>
                    <p>可视化知识网络，智能推荐相关内容</p>
                </div>
                <div class="tool-card" onclick="window.location.href='ai-research.html'">
                    <div class="tool-icon">📊</div>
                    <h3>AI调研报告</h3>
                    <p>AI生成的行业调研、市场分析、技术趋势报告</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 浙江悦和科技有限公司 | 电力在线监测知识库</p>
        <p class="powered-by">Power By HLH</p>
    </footer>

    <div class="ai-float" onclick="window.location.href='chat.html'">
        <span>💬</span>
        <span>AI 助手</span>
    </div>
</body>
</html>
